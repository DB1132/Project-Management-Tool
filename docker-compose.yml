version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb_service
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: always

  web:
    build: .
    container_name: web_app_service
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/project_management
      - JWT_SECRET=123456 # Replace this with a strong secret key in production
    restart: always

volumes:
  mongo_data:
